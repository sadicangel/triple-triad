syntax = "proto3";

option csharp_namespace = "TripleTriad.Models";

package tripletriad;

import "player.proto";
import "navigation.proto";
import "status.proto";
import "ruleset.proto";
import "board.proto";
import "move.proto";

message Message {
  Player player = 1;
  oneof content {
    Navigation navigation = 2;
    string text = 3;
    Status status = 4;
    Ruleset ruleset = 5;
    Board board = 6;
    Move move = 7;
  }
}