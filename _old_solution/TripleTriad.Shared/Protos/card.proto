syntax = "proto3";

option csharp_namespace = "TripleTriad.Models";

package tripletriad;

import "element.proto";

message Card {
  string id = 1;
  string name = 2;
  int32 edition = 3;
  int32 tier = 4;
  int32 number = 5;
  int32 version = 6;
  Element element = 7;
  int32 left = 8;
  int32 up = 9;
  int32 right = 10;
  int32 down = 11;
}